<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TwagiFit"/>
<meta name="theme-color" content="#080808"/>
<title>TwagiFit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#080808;min-height:100%;font-family:'Helvetica Neue',Arial,sans-serif;color:#fff;overscroll-behavior:none}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
#app{max-width:480px;margin:0 auto;padding:20px 16px;min-height:100vh}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}
.screen{display:none}.screen.active{display:block}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px}
.logo{font-size:34px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1}
.logo span{color:#E63946}
.date-str{font-size:11px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:3px}
.hist-btn{background:none;border:1px solid #222;color:#555;border-radius:8px;padding:6px 12px;font-size:12px;letter-spacing:2px;text-transform:uppercase}

/* SECTION LABEL */
.slabel{font-size:11px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:14px}

/* GROUPS GRID */
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.group-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:16px 14px;text-align:left;position:relative;overflow:hidden;width:100%}
.group-card.done{border-color:var(--c55)}
.group-card-bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--c);display:none}
.group-card.done .group-card-bar{display:block}
.group-name{font-size:19px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;color:#e0e0e0}
.group-card.done .group-name{color:var(--c)}
.group-count{font-size:11px;letter-spacing:1px;color:#333}
.group-card.done .group-count{color:var(--c99)}

/* BACK ROW */
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.back-btn{background:#0f0f0f;border:1px solid #1e1e1e;color:#555;border-radius:8px;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.screen-title{font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* EXERCISE LIST */
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:12px 14px;text-align:left;display:flex;align-items:center;gap:12px;width:100%}
.ex-card.done{border-color:var(--c44)}
.ex-icon-wrap{border-radius:10px;flex-shrink:0;border:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;width:70px;height:70px;overflow:hidden;background:#111}
.ex-card.done .ex-icon-wrap{border-color:var(--c30);background:var(--c15)}
.ex-icon-wrap svg{display:block}
.ex-info{flex:1;min-width:0}
.ex-sub{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#444;margin-bottom:2px}
.ex-name{font-size:16px;font-weight:700;letter-spacing:.5px;color:#999;margin-bottom:4px}
.ex-card.done .ex-name{color:#fff}
.ex-sets-row{display:flex;gap:4px;flex-wrap:wrap}
.ex-set-chip{border-radius:5px;padding:2px 7px;font-size:11px;letter-spacing:1px;background:var(--c20);color:var(--c)}
.ex-last{font-size:11px;color:#333}
.ex-arrow{color:#2a2a2a;font-size:20px}

/* LOG SCREEN */
.log-header{display:flex;align-items:center;gap:16px;margin-bottom:8px;background:#0f0f0f;border-radius:16px;padding:14px;border:1px solid var(--c30)}
.log-icon-wrap{border-radius:12px;border:1px solid var(--c30);display:flex;align-items:center;justify-content:center;width:82px;height:82px;overflow:hidden;flex-shrink:0;background:var(--c15)}
.log-ex-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:4px}
.log-ex-name{font-size:20px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
.ref-box{background:#0f0f0f;border-radius:10px;padding:10px 14px;margin-bottom:18px;border:1px solid #1a1a1a}
.ref-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#333;margin-bottom:6px}
.ref-chips{display:flex;gap:6px;flex-wrap:wrap}
.ref-chip{background:#161616;color:#444;border-radius:6px;padding:3px 10px;font-size:13px;letter-spacing:1px}
.sets-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:10px;background:#0f0f0f;border-radius:12px;padding:10px 14px;border:1px solid #1a1a1a}
.set-row.filled{border-color:var(--c33)}
.set-num{font-size:15px;font-weight:700;min-width:20px;color:var(--c)}
.set-fields{flex:1;display:flex;gap:10px}
.set-field{flex:1}
.field-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#333;margin-bottom:3px}
.field-input{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:7px 10px;color:#fff;font-size:20px;font-weight:700;outline:none}
.field-input.filled{border-color:var(--c55)}
.set-del{background:none;border:none;color:#333;font-size:20px;padding:0 4px}
.add-set-btn{width:100%;background:none;border:1px dashed var(--c33);color:var(--c88);border-radius:12px;padding:12px;font-size:14px;letter-spacing:2px;text-transform:uppercase}

/* HISTORY */
.hist-day{margin-bottom:16px;background:#111;border-radius:12px;overflow:hidden;border:1px solid #1e1e1e}
.hist-day-label{background:#161616;padding:8px 16px;font-size:12px;letter-spacing:2px;color:#555;text-transform:uppercase}
.hist-ex-row{padding:10px 16px;border-bottom:1px solid #161616;display:flex;align-items:center;gap:10px}
.hist-ex-name{font-size:13px;color:#bbb;flex:1}
.hist-chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.hist-chip{background:#1e1e1e;border-radius:5px;padding:2px 8px;font-size:12px;color:#777;letter-spacing:1px}
.empty-msg{color:#555;text-align:center;margin-top:60px;font-size:14px}
</style>
</head>
<body>
<div id="app">

  <!-- GROUPS -->
  <div id="screen-groups" class="screen active">
    <div class="header">
      <div>
        <div class="date-str" id="date-str"></div>
        <div class="logo">Twagi<span>Fit</span></div>
      </div>
      <button class="hist-btn" onclick="showHistory()">Historique</button>
    </div>
    <div class="slabel">Groupe musculaire</div>
    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <!-- EXERCISES -->
  <div id="screen-exercises" class="screen">
    <div class="header" style="margin-bottom:0">
      <div>
        <div class="date-str" id="date-str2"></div>
        <div class="logo">Twagi<span>Fit</span></div>
      </div>
      <button class="hist-btn" onclick="showHistory()">Historique</button>
    </div>
    <div class="back-row" style="margin-top:20px">
      <button class="back-btn" onclick="showGroups()">←</button>
      <span class="screen-title" id="ex-screen-title"></span>
    </div>
    <div class="ex-list" id="ex-list"></div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen">
    <div class="back-row">
      <button class="back-btn" onclick="showExercises()">←</button>
      <span style="font-size:13px;letter-spacing:2px;color:#444;text-transform:uppercase" id="log-group-label"></span>
    </div>
    <div class="log-header" id="log-header"></div>
    <div id="ref-box-wrap"></div>
    <div class="slabel" style="margin-top:4px">Séries</div>
    <div class="sets-list" id="sets-list"></div>
    <button class="add-set-btn" id="add-set-btn" onclick="addSet()">+ Ajouter une série</button>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div class="back-row">
      <button class="back-btn" onclick="showGroups()">←</button>
      <span class="screen-title">Historique</span>
    </div>
    <div id="history-content"></div>
  </div>

</div>

// ── STATE ──────────────────────────────────────────────────────────
var state = {
  activeGroup: null,
  activeEx: null,
  logs: {},
};

function today() {
  return new Date().toISOString().split('T')[0];
}

function loadLogs() {
  try { var r = localStorage.getItem('twagi_logs'); if(r) state.logs = JSON.parse(r); } catch(e){}
}

function saveLogs() {
  try { localStorage.setItem('twagi_logs', JSON.stringify(state.logs)); } catch(e){}
}

function getSets() {
  var t = today(), id = state.activeEx.id;
  if (!state.logs[t]) state.logs[t] = {};
  if (!state.logs[t][id]) state.logs[t][id] = [{reps:'',weight:''}];
  return state.logs[t][id];
}

function hexToCSS(hex, alpha) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

// ── SCREENS ────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showGroups() {
  renderGroups();
  showScreen('screen-groups');
}

function showExercises() {
  renderExercises();
  showScreen('screen-exercises');
}

function showLog(ex) {
  state.activeEx = ex;
  renderLog();
  showScreen('screen-log');
}

function showHistory() {
  renderHistory();
  showScreen('screen-history');
}

// ── RENDER GROUPS ──────────────────────────────────────────────────
function renderGroups() {
  var d = new Date();
  var ds = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'}).toUpperCase();
  document.getElementById('date-str').textContent = ds;
  var t = today();
  var grid = document.getElementById('groups-grid');
  grid.innerHTML = '';
  GROUPS.forEach(function(g) {
    var exList = EXERCISES[g.id] || [];
    var done = Object.keys(state.logs[t]||{}).filter(function(id){ return exList.find(function(e){return e.id===id;}); }).length;
    var card = document.createElement('button');
    card.className = 'group-card' + (done ? ' done' : '');
    card.style.setProperty('--c', g.color);
    card.style.setProperty('--c55', hexToCSS(g.color, 0.33));
    card.style.setProperty('--c99', hexToCSS(g.color, 0.6));
    card.innerHTML = '<div class="group-card-bar"></div>'
      + '<div class="group-name">'+g.label+'</div>'
      + '<div class="group-count">'+(done ? done+'/'+exList.length+' exercices' : exList.length+' exercices')+'</div>';
    card.onclick = function(){ state.activeGroup = g.id; showExercises(); };
    grid.appendChild(card);
  });
}

// ── RENDER EXERCISES ───────────────────────────────────────────────
function renderExercises() {
  var g = GROUPS.find(function(x){return x.id===state.activeGroup;});
  var t = today();
  document.getElementById('date-str2').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'}).toUpperCase();
  var title = document.getElementById('ex-screen-title');
  title.textContent = g.label;
  title.style.color = g.color;
  var list = document.getElementById('ex-list');
  list.innerHTML = '';
  (EXERCISES[state.activeGroup]||[]).forEach(function(ex) {
    var todaySets = ((state.logs[t]||{})[ex.id]||[]).filter(function(s){return s.reps||s.weight;});
    var lastDate = Object.keys(state.logs).filter(function(d){return d!==t && state.logs[d][ex.id];}).sort().reverse()[0];
    var lastSets = lastDate ? state.logs[lastDate][ex.id].filter(function(s){return s.reps||s.weight;}) : null;
    var card = document.createElement('button');
    card.className = 'ex-card' + (todaySets.length ? ' done' : '');
    card.style.setProperty('--c', g.color);
    card.style.setProperty('--c44', hexToCSS(g.color,0.27));
    card.style.setProperty('--c30', hexToCSS(g.color,0.19));
    card.style.setProperty('--c15', hexToCSS(g.color,0.08));
    card.style.setProperty('--c20', hexToCSS(g.color,0.12));
    var iconColor = todaySets.length ? g.color : '#3a3a3a';
    var setsHTML = '';
    if (todaySets.length) {
      setsHTML = '<div class="ex-sets-row">'+todaySets.map(function(s){
        return '<span class="ex-set-chip">'+(s.reps?s.reps+'×':'')+(s.weight?s.weight+'kg':'')+'</span>';
      }).join('')+'</div>';
    } else if (lastSets && lastSets.length) {
      setsHTML = '<div class="ex-last">Dernière: '+lastSets.map(function(s){return (s.reps||'?')+'×'+(s.weight||'?')+'kg';}).join(' · ')+'</div>';
    } else {
      setsHTML = '<div class="ex-last" style="color:#2a2a2a">Pas encore effectué</div>';
    }
    card.innerHTML = '<div class="ex-icon-wrap">'+icon(ex.icon,58,iconColor)+'</div>'
      +'<div class="ex-info"><div class="ex-sub">'+ex.sub+'</div><div class="ex-name">'+ex.name+'</div>'+setsHTML+'</div>'
      +'<div class="ex-arrow">›</div>';
    card.onclick = function(){ showLog(ex); };
    list.appendChild(card);
  });
}

// ── RENDER LOG ─────────────────────────────────────────────────────
function renderLog() {
  var g = GROUPS.find(function(x){return x.id===state.activeGroup;});
  var ex = state.activeEx;
  document.getElementById('log-group-label').textContent = g.label;
  // header
  document.getElementById('log-header').style.borderColor = hexToCSS(g.color,0.19);
  document.getElementById('log-header').innerHTML =
    '<div class="log-icon-wrap" style="background:'+hexToCSS(g.color,0.08)+';border-color:'+hexToCSS(g.color,0.19)+'">'+icon(ex.icon,68,g.color)+'</div>'
    +'<div><div class="log-ex-sub">'+ex.sub+'</div><div class="log-ex-name">'+ex.name+'</div></div>';
  // reference
  var t = today();
  var lastDate = Object.keys(state.logs).filter(function(d){return d!==t && state.logs[d][ex.id];}).sort().reverse()[0];
  var refWrap = document.getElementById('ref-box-wrap');
  if (lastDate) {
    var lastSets = state.logs[lastDate][ex.id].filter(function(s){return s.reps||s.weight;});
    var ld = new Date(lastDate+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    refWrap.innerHTML = '<div class="ref-box"><div class="ref-label">Référence · '+ld+'</div>'
      +'<div class="ref-chips">'+lastSets.map(function(s,i){
        return '<span class="ref-chip">S'+(i+1)+' · '+s.reps+'× · '+s.weight+'kg</span>';
      }).join('')+'</div></div>';
  } else { refWrap.innerHTML=''; }
  // add-set color
  var btn = document.getElementById('add-set-btn');
  btn.style.borderColor = hexToCSS(g.color,0.2);
  btn.style.color = hexToCSS(g.color,0.53);
  renderSets();
}

function renderSets() {
  var g = GROUPS.find(function(x){return x.id===state.activeGroup;});
  var sets = getSets();
  var list = document.getElementById('sets-list');
  list.innerHTML = '';
  sets.forEach(function(s, i) {
    var row = document.createElement('div');
    var filled = s.reps||s.weight;
    row.className = 'set-row' + (filled?' filled':'');
    row.style.setProperty('--c', g.color);
    row.style.setProperty('--c33', hexToCSS(g.color,0.2));
    row.style.setProperty('--c55', hexToCSS(g.color,0.33));
    var delBtn = sets.length > 1 ? '<button class="set-del" onclick="delSet('+i+')">×</button>' : '';
    row.innerHTML = '<span class="set-num">'+(i+1)+'</span>'
      +'<div class="set-fields">'
      +'<div class="set-field"><div class="field-label">Reps</div>'
      +'<input class="field-input'+(s.reps?' filled':'')+'" type="number" inputmode="numeric" value="'+s.reps+'" placeholder="—" oninput="updateSet('+i+',\'reps\',this.value)"/></div>'
      +'<div class="set-field"><div class="field-label">Poids kg</div>'
      +'<input class="field-input'+(s.weight?' filled':'')+'" type="number" inputmode="decimal" value="'+s.weight+'" placeholder="—" oninput="updateSet('+i+',\'weight\',this.value)"/></div>'
      +'</div>'+delBtn;
    list.appendChild(row);
  });
}

function updateSet(i, field, val) {
  var sets = getSets();
  sets[i][field] = val;
  saveLogs();
  // just update border color without full re-render
  var rows = document.querySelectorAll('.set-row');
  if(rows[i]) {
    var inp = rows[i].querySelectorAll('.field-input');
    inp.forEach(function(el){ el.classList.toggle('filled', !!el.value); });
    rows[i].classList.toggle('filled', !!(sets[i].reps||sets[i].weight));
  }
}

function addSet() {
  var sets = getSets();
  sets.push({reps:'',weight:''});
  saveLogs();
  renderSets();
}

function delSet(i) {
  var sets = getSets();
  sets.splice(i,1);
  if(!sets.length) sets.push({reps:'',weight:''});
  saveLogs();
  renderSets();
}

// ── RENDER HISTORY ─────────────────────────────────────────────────
function renderHistory() {
  var dates = Object.keys(state.logs).sort().reverse().slice(0,14);
  var wrap = document.getElementById('history-content');
  if (!dates.length) { wrap.innerHTML='<div class="empty-msg">Aucune séance enregistrée</div>'; return; }
  wrap.innerHTML = dates.map(function(date) {
    var dayLogs = state.logs[date];
    var label = new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    var rows = Object.keys(dayLogs).map(function(exId) {
      var sets = dayLogs[exId].filter(function(s){return s.reps||s.weight;});
      if (!sets.length) return '';
      var exName = [].concat.apply([],Object.values(EXERCISES)).find(function(e){return e.id===exId;});
      return '<div class="hist-ex-row"><span class="hist-ex-name">'+(exName?exName.name:exId)+'</span>'
        +'<div class="hist-chips">'+sets.map(function(s){
          return '<span class="hist-chip">'+(s.reps?s.reps+'×':'')+(s.weight?s.weight+'kg':'')+'</span>';
        }).join('')+'</div></div>';
    }).join('');
    if (!rows) return '';
    return '<div class="hist-day"><div class="hist-day-label">'+label+'</div>'+rows+'</div>';
  }).join('');
}

// ── INIT ───────────────────────────────────────────────────────────
loadLogs();
showGroups();
</script>
</body>
</html>
